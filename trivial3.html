<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Cèltic Girona Gaelic Quiz</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0b6623,#1e8449);
color:white;
text-align:center;
padding:20px;
}

#quiz-container{
background:#145a32;
padding:25px;
border-radius:12px;
max-width:800px;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

#answers{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:20px;
}

.answer{
padding:18px;
font-size:18px;
border-radius:10px;
font-weight:bold;
}

.answer:nth-child(1){background:#e74c3c;}
.answer:nth-child(2){background:#3498db;}
.answer:nth-child(3){background:#f1c40f;color:black;}
.answer:nth-child(4){background:#2ecc71;}

#progress-bar{
width:100%;
background:#0b3d1b;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

#progress{
height:15px;
background:gold;
width:0%;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:gold;
font-size:16px;
margin-top:10px;
cursor:pointer;
}

table{
width:100%;
margin-top:25px;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid rgba(255,255,255,0.3);
}

th{color:gold;}

#timer{
color:gold;
font-size:20px;
}

#confetti{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🏐 Gaelic Football Quiz</h1>
<h2>Cèltic Girona</h2>

<select id="lang">
<option value="ca">Català</option>
<option value="en">English</option>
</select>

<div id="quiz-container">

<div id="start">

<input id="player" placeholder="Nom jugador">
<br>
<button onclick="startGame()">Començar</button>

</div>

<div id="game" style="display:none">

<div id="progress-bar">
<div id="progress"></div>
</div>

<div id="timer">⏱ 10</div>

<h2 id="question"></h2>

<div id="answers"></div>

<button id="next" style="display:none">Següent</button>

<div id="result"></div>

<button id="restart" style="display:none">Tornar a jugar</button>

<h3>🏆 Ranking</h3>

<table>
<thead>
<tr><th>Jugador</th><th>Punts</th></tr>
</thead>
<tbody id="ranking"></tbody>
</table>

</div>

</div>

<canvas id="confetti"></canvas>

<script>

let allQuestions=[

{q:"Quants jugadors té cada equip?",a:["11","13","15","17"],c:2},
{q:"Quants punts val un gol?",a:["1","2","3","4"],c:2},
{q:"Quants punts val passar el travesser?",a:["1","2","3","4"],c:0},
{q:"Quin moviment és portar la pilota al peu?",a:["Solo","Dribble","Bounce","Hand pass"],c:0},
{q:"Organització dels esports gaèlics?",a:["FIFA","UEFA","GAA","IRFU"],c:2},
{q:"Origen del futbol gaèlic?",a:["Escòcia","Irlanda","Anglaterra","Austràlia"],c:1},
{q:"Fundació del Cèltic Girona?",a:["2023","2024","2025","2026"],c:2},
{q:"Passos sense botar?",a:["4","6","8","10"],c:0},
{q:"Com es diu xutar deixant caure la pilota?",a:["Drop kick","Solo","Hand pass","Toe kick"],c:0},
{q:"Mida del camp?",a:["Igual futbol","Una mica més gran","Molt més petit","Sala"],c:1},
{q:"Equip amb més All-Ireland?",a:["Kerry","Dublin","Mayo","Cork"],c:1},
{q:"Pilota similar a quin esport?",a:["Rugbi","Futbol","Handbol","Bàsquet"],c:1}

];

let questions=[];
let current=0;
let score=0;
let timer;
let time=10;
let player="";

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5);
}

function startGame(){

player=document.getElementById("player").value||"Jugador";

questions=shuffle([...allQuestions]).slice(0,10);

document.getElementById("start").style.display="none";
document.getElementById("game").style.display="block";

loadQ();
loadRanking();

}

function loadQ(){

clearInterval(timer);

time=10;
document.getElementById("timer").innerText="⏱ "+time;

timer=setInterval(()=>{

time--;
document.getElementById("timer").innerText="⏱ "+time;

if(time<=0){
clearInterval(timer);
answer(-1);
}

},1000);

let q=questions[current];

document.getElementById("question").innerText=q.q;

let answers=document.getElementById("answers");
answers.innerHTML="";

q.a.forEach((txt,i)=>{

let b=document.createElement("button");
b.innerText=txt;
b.className="answer";

b.onclick=()=>answer(i);

answers.appendChild(b);

});

document.getElementById("progress").style.width=(current/10*100)+"%";

}

function answer(i){

clearInterval(timer);

let q=questions[current];

let btns=document.querySelectorAll(".answer");

btns.forEach((b,idx)=>{

b.disabled=true;

if(idx===q.c) b.style.outline="4px solid white";

if(idx===i && idx!==q.c) b.style.opacity="0.4";

});

if(i===q.c) score++;

document.getElementById("next").style.display="inline-block";

}

document.getElementById("next").onclick=()=>{

current++;

if(current<questions.length){

loadQ();
document.getElementById("next").style.display="none";

}else finish();

}

function medal(){

if(score==10) return "🥇 Or";
if(score>=7) return "🥈 Plata";
if(score>=5) return "🥉 Bronze";
return "👍";

}

function finish(){

document.getElementById("question").innerText="Quiz acabat!";

document.getElementById("answers").innerHTML="";

document.getElementById("result").innerHTML=
player+" ha fet "+score+"/10 punts "+medal();

saveScore();
loadRanking();

if(score==10) confetti();

document.getElementById("restart").style.display="inline-block";

}

function saveScore(){

let r=JSON.parse(localStorage.getItem("ranking"))||[];

r.push({n:player,s:score});

r.sort((a,b)=>b.s-a.s);

r=r.slice(0,10);

localStorage.setItem("ranking",JSON.stringify(r));

}

function loadRanking(){

let r=JSON.parse(localStorage.getItem("ranking"))||[];

let html="";

r.forEach(p=>{

html+="<tr><td>"+p.n+"</td><td>"+p.s+"</td></tr>";

});

document.getElementById("ranking").innerHTML=html;

}

function confetti(){

let canvas=document.getElementById("confetti");
let ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

for(let i=0;i<150;i++){

ctx.fillStyle=["gold","green","white"][Math.floor(Math.random()*3)];

ctx.fillRect(Math.random()*canvas.width,
Math.random()*canvas.height,
5,10);

}

}

document.getElementById("restart").onclick=()=>location.reload();

</script>

</body>
</html>

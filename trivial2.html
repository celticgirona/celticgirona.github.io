<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Trivial Futbol Gaèlic | Cèltic Girona</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0b6623,#1e8449);
color:white;
text-align:center;
padding:30px;
}

h1{
margin-bottom:5px;
}

#quiz-container{
background:#145a32;
padding:30px;
border-radius:12px;
max-width:700px;
margin:auto;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

input{
padding:10px;
font-size:16px;
border-radius:6px;
border:none;
margin-top:10px;
}

button{
cursor:pointer;
border:none;
border-radius:6px;
padding:12px 20px;
font-size:16px;
}

#startBtn{
background:gold;
margin-top:15px;
}

.answer{
display:block;
width:100%;
margin:8px 0;
padding:12px;
background:white;
color:black;
}

.answer:hover{
background:#ddd;
}

.correct{
background:#2ecc71 !important;
color:white;
}

.wrong{
background:#e74c3c !important;
color:white;
}

#nextBtn{
background:gold;
margin-top:15px;
display:none;
}

#restartBtn{
background:gold;
margin-top:20px;
display:none;
}

#progress-bar{
width:100%;
background:#0b3d1b;
border-radius:10px;
overflow:hidden;
margin-bottom:20px;
}

#progress{
height:15px;
background:gold;
width:0%;
}

#timer{
font-size:18px;
margin-bottom:10px;
color:gold;
}

#question-number{
margin-bottom:10px;
opacity:0.8;
}

#result{
font-size:22px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>Trivial Futbol Gaèlic 🏐</h1>
<h2>Cèltic Girona</h2>

<div id="quiz-container">

<div id="start-screen">

<p>Introdueix el teu nom per començar:</p>

<input type="text" id="playerName" placeholder="El teu nom">

<br>

<button id="startBtn">Començar Quiz</button>

</div>


<div id="quiz-screen" style="display:none;">

<div id="progress-bar">
<div id="progress"></div>
</div>

<div id="question-number"></div>

<div id="timer">⏱ 10</div>

<h3 id="question"></h3>

<div id="answers"></div>

<button id="nextBtn">Següent</button>

<div id="result"></div>

<button id="restartBtn">Tornar a jugar</button>

</div>

</div>

<script>

const questions = [

{
question:"Quants jugadors té cada equip al camp en un partit oficial de futbol gaèlic?",
answers:["11","13","15","17"],
correct:2
},

{
question:"Com s'anomena xutar la pilota mentre cau de les mans?",
answers:["Solo","Drop kick","Hand pass","Bounce"],
correct:1
},

{
question:"Quants punts val un gol?",
answers:["1","2","3","5"],
correct:2
},

{
question:"Quants punts val passar la pilota per sobre el travesser?",
answers:["1","2","3","Depèn"],
correct:0
},

{
question:"Quina acció és legal en futbol gaèlic?",
answers:[
"Fer un màxim de 4 passos sense botar",
"Fer placatges com al rugbi",
"Córrer amb la pilota sense límit",
"No es pot usar les mans"
],
correct:0
},

{
question:"Quin moviment permet avançar botant la pilota al peu?",
answers:[
"Solo",
"Dribble",
"Foot run",
"Kick carry"
],
correct:0
},

{
question:"Com és el camp de futbol gaèlic comparat amb el de futbol?",
answers:[
"Molt més petit",
"Una mica més gran",
"Igual",
"Com un camp de rugbi"
],
correct:1
},

{
question:"Quina organització gestiona els esports gaèlics?",
answers:[
"GAA",
"FIFA",
"UEFA",
"IRFU"
],
correct:0
},

{
question:"Quan es va fundar el Cèltic Girona?",
answers:[
"2023",
"2024",
"2025",
"2026"
],
correct:2
},

{
question:"De quin país prové el futbol gaèlic?",
answers:[
"Escòcia",
"Anglaterra",
"Irlanda",
"Austràlia"
],
correct:2
}

];

let current=0;
let score=0;
let timer;
let timeLeft=10;
let player="";

const startBtn=document.getElementById("startBtn");
const startScreen=document.getElementById("start-screen");
const quizScreen=document.getElementById("quiz-screen");

const questionEl=document.getElementById("question");
const answersEl=document.getElementById("answers");
const nextBtn=document.getElementById("nextBtn");
const resultEl=document.getElementById("result");
const restartBtn=document.getElementById("restartBtn");

const progress=document.getElementById("progress");
const timerEl=document.getElementById("timer");
const questionNumber=document.getElementById("question-number");

startBtn.onclick=()=>{

player=document.getElementById("playerName").value;

if(player==="") player="Jugador";

startScreen.style.display="none";
quizScreen.style.display="block";

loadQuestion();

}

function loadQuestion(){

clearInterval(timer);

timeLeft=10;
timerEl.innerText="⏱ "+timeLeft;

timer=setInterval(()=>{

timeLeft--;
timerEl.innerText="⏱ "+timeLeft;

if(timeLeft<=0){
clearInterval(timer);
selectAnswer(null,-1);
}

},1000);

let q=questions[current];

questionNumber.innerText="Pregunta "+(current+1)+" de "+questions.length;

questionEl.innerText=q.question;

answersEl.innerHTML="";

q.answers.forEach((a,i)=>{

let btn=document.createElement("button");

btn.innerText=a;
btn.classList.add("answer");

btn.onclick=()=>selectAnswer(btn,i);

answersEl.appendChild(btn);

});

progress.style.width=(current/questions.length*100)+"%";

}

function selectAnswer(btn,i){

clearInterval(timer);

let q=questions[current];

let buttons=document.querySelectorAll(".answer");

buttons.forEach((b,index)=>{

b.disabled=true;

if(index===q.correct){
b.classList.add("correct");
}

if(index===i && index!==q.correct){
b.classList.add("wrong");
}

});

if(i===q.correct) score++;

nextBtn.style.display="inline-block";

}

nextBtn.onclick=()=>{

current++;

if(current<questions.length){

loadQuestion();
nextBtn.style.display="none";

}else{

finishQuiz();

}

}

function finishQuiz(){

progress.style.width="100%";

questionEl.innerText="Trivial acabat!";

answersEl.innerHTML="";

resultEl.innerHTML=
player+" ha fet <b>"+score+" / "+questions.length+"</b> punts ⭐";

restartBtn.style.display="inline-block";
nextBtn.style.display="none";

}

restartBtn.onclick=()=>{

current=0;
score=0;

resultEl.innerHTML="";
restartBtn.style.display="none";

loadQuestion();

}

</script>

</body>
</html>
